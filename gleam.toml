name = "json2gleam"
version = "0.1.0"
target = "erlang"

description = "Generate Gleam types, decoders, and encoders from JSON. Instantly."
licences = ["MIT"]
repository = { type = "github", user = "json2gleam", repo = "json2gleam" }

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
glint = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
justin = ">= 1.0.0 and < 2.0.0"
stdin = ">= 2.0.0 and < 3.0.0"
argv = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
gleescript = ">= 1.0.0 and < 2.0.0"
